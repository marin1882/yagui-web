<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagüi — Busca en el comercio local</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        terracota: "#E2725B",
        sunset:    "#FD5E53",
        chile:     "#C21807",
        olive: {
          DEFAULT: "#808000",
          dark:    "#5a5a00",
          mid:     "#666600",
          light:   "#aaaa00",
          bright:  "#d4d400",
        },
      },
      fontFamily: {
        mono:    ['"Martian Mono"', "monospace"],
        grotesk: ['"Space Grotesk"', "sans-serif"],
      },
    },
  },
};
</script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Space Grotesk", sans-serif; }

  .material-symbols-rounded {
    font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
    user-select: none;
    line-height: 1;
  }

  /* Input: quitar borde/outline nativo, placeholder en blanco translúcido */
  #input-busqueda::placeholder { color: rgba(255,255,255,0.5); }
  #input-busqueda:focus { outline: none; }
  #input-busqueda { caret-color: white; }

  /* Olive terminal box scrollbar */
  #caja-respuesta::-webkit-scrollbar { width: 5px; }
  #caja-respuesta::-webkit-scrollbar-track { background: #5a5a00; border-radius: 4px; }
  #caja-respuesta::-webkit-scrollbar-thumb { background: #aaaa00; border-radius: 4px; }

  /* Mic pulse cuando graba */
  @keyframes mic-pulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.85); }
  }
  .grabando { animation: mic-pulse 0.75s ease-in-out infinite; }

  /* Cursor terminal parpadeante */
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  .cursor-blink { animation: blink 1s step-end infinite; }

  /* Smooth dot color transition */
  #dot-red { transition: background-color 0.5s ease; }
</style>
</head>

<body class="bg-terracota min-h-screen flex flex-col">

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header class="flex items-center justify-between px-6 py-5">
  <!-- Logo -->
  <div class="font-mono font-bold text-white text-xl tracking-tight select-none">
    Yag<span class="text-chile">ü</span>i
  </div>

  <!-- Estado de la red -->
  <div class="flex items-center gap-2">
    <span id="dot-red"
      class="block w-2 h-2 rounded-full bg-white/25">
    </span>
    <span id="texto-red"
      class="font-mono text-xs text-white/50 tracking-tight">
      comprobando red…
    </span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     MAIN
═══════════════════════════════════════════ -->
<main class="flex-1 flex flex-col items-center justify-center px-4 pt-2 pb-10 gap-7">

  <!-- Título -->
  <div class="text-center">
    <h1 class="font-grotesk font-bold text-white leading-tight tracking-tight"
        style="font-size: clamp(2rem, 8vw, 3.5rem);">
      ¿Qué buscas?
    </h1>
    <p class="font-grotesk text-white/55 text-sm mt-2 font-light">
      Inventario en tiempo real · comercio local
    </p>
  </div>

  <!-- Barra de búsqueda (sunset) -->
  <div class="w-full" style="max-width:640px;">
    <div class="flex items-center bg-sunset rounded-2xl px-4 py-3 gap-2 shadow-lg">

      <!-- Campo de texto -->
      <input
        id="input-busqueda"
        type="text"
        placeholder="tornillos M6, café molido, pintura blanca…"
        class="flex-1 bg-transparent text-white font-grotesk text-base
               border-none focus:outline-none"
        autocomplete="off"
        spellcheck="false"
      />

      <!-- Botón búsqueda (lupa) -->
      <button
        id="btn-buscar"
        class="text-white/70 hover:text-white transition-colors flex items-center justify-center
               w-9 h-9 rounded-full hover:bg-white/10"
        title="Buscar"
        aria-label="Buscar"
      >
        <span class="material-symbols-rounded text-2xl">search</span>
      </button>

      <!-- Separador -->
      <div class="w-px h-5 bg-white/20"></div>

      <!-- Botón micrófono (chile red) -->
      <button
        id="btn-mic"
        class="text-chile flex items-center justify-center
               w-9 h-9 rounded-full hover:bg-white/10 transition-colors"
        title="Buscar por voz"
        aria-label="Buscar por voz"
      >
        <span class="material-symbols-rounded text-2xl">mic</span>
      </button>

    </div>

    <!-- Estado / feedback de búsqueda -->
    <p id="estado-busqueda"
       class="font-mono text-white/40 text-xs mt-2 px-1 min-h-[1.1em] tracking-tight">
    </p>
  </div>

  <!-- Caja de respuesta (olive) -->
  <div class="w-full" style="max-width:640px;">
    <div
      id="caja-respuesta"
      class="bg-olive rounded-xl p-5 font-mono text-sm leading-relaxed
             overflow-y-auto shadow-inner"
      style="color:#d4d400; min-height:220px; max-height:400px;"
    >
      <!-- Contenido inicial -->
      <p class="opacity-50"><span style="color:#aaaa00;">&gt;</span> Escribe o habla para buscar</p>
      <p class="opacity-50"><span style="color:#aaaa00;">&gt;</span> en la red Yagüi</p>
      <p class="mt-3 opacity-30">
        <span class="cursor-blink">█</span>
      </p>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════ -->
<footer class="text-center py-5 px-6 font-mono text-xs text-white/35 space-y-1.5">
  <div class="flex justify-center gap-5 flex-wrap">
    <a href="#" class="hover:text-white/60 transition-colors">Privacidad</a>
    <a href="#" class="hover:text-white/60 transition-colors">Términos</a>
    <a href="#" class="hover:text-white/60 transition-colors">Acerca de</a>
  </div>
  <div>
    API:
    <a href="https://xn--yagi-2ra.com/buscar?q=test&key=demo"
       class="underline underline-offset-2 hover:text-white/60 transition-colors">
      xn--yagi-2ra.com/buscar?q=test&amp;key=demo
    </a>
  </div>
</footer>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════ -->
<script>
"use strict";

const API_BASE   = "https://xn--yagi-2ra.com";
const AI_BASE    = "https://xn--yagi-2ra.com/ai";
const BUSCAR_KEY = "demo";

const inputEl    = document.getElementById("input-busqueda");
const btnBuscar  = document.getElementById("btn-buscar");
const btnMic     = document.getElementById("btn-mic");
const cajaEl     = document.getElementById("caja-respuesta");
const estadoEl   = document.getElementById("estado-busqueda");
const dotEl      = document.getElementById("dot-red");
const textoRedEl = document.getElementById("texto-red");

// ── Estado de la red ──────────────────────────────────────────────────────────

async function actualizarEstadoRed() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 5000);
    const r = await fetch(
      `${API_BASE}/buscar?q=_ping&key=${BUSCAR_KEY}`,
      { signal: ctrl.signal }
    );
    const d = await r.json();
    const n = d.nodos_consultados ?? 0;
    if (n > 0) {
      dotEl.style.backgroundColor = "#4ade80";
      textoRedEl.textContent = `🟢 ${n} nodo${n !== 1 ? "s" : ""} activo${n !== 1 ? "s" : ""}`;
    } else {
      dotEl.style.backgroundColor = "rgba(255,255,255,0.25)";
      textoRedEl.textContent = "sin nodos activos";
    }
    textoRedEl.style.opacity = "0.6";
  } catch {
    dotEl.style.backgroundColor = "rgba(255,255,255,0.15)";
    textoRedEl.textContent = "sin conexión";
    textoRedEl.style.opacity = "0.35";
  }
}

actualizarEstadoRed();
setInterval(actualizarEstadoRed, 30_000);

// ── Búsqueda ──────────────────────────────────────────────────────────────────

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") lanzarBusqueda();
});
btnBuscar.addEventListener("click", lanzarBusqueda);

function lanzarBusqueda() {
  const q = inputEl.value.trim();
  if (q) buscar(q);
}

async function buscar(q) {
  btnBuscar.disabled = true;
  estadoEl.textContent = "";
  setCaja([
    `> Buscando "${q}"…`,
    `> Consultando red Yagüi...`,
  ]);

  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 10_000);

    const r = await fetch(
      `${API_BASE}/buscar?q=${encodeURIComponent(q)}&key=${BUSCAR_KEY}`,
      { signal: ctrl.signal }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const n = data.nodos_consultados ?? 0;
    estadoEl.textContent = n > 0
      ? `${n} nodo${n !== 1 ? "s" : ""} consultado${n !== 1 ? "s" : ""}`
      : "0 nodos activos";

    renderResultados(data, q);
  } catch (e) {
    if (e.name === "AbortError") {
      setCaja(["> Tiempo de espera agotado.", "> Comprueba tu conexión."]);
    } else {
      setCaja([`> Error: ${e.message}`]);
    }
  } finally {
    btnBuscar.disabled = false;
  }
}

function renderResultados(data, q) {
  const n = data.nodos_consultados ?? 0;
  const resultados = data.resultados ?? [];
  const lines = [];

  lines.push(`> Búsqueda: "${q}"`);
  lines.push(`> ${n} nodo${n !== 1 ? "s" : ""} respondido${n !== 1 ? "s" : ""}`);
  lines.push("");

  if (!resultados.length) {
    lines.push("> Sin coincidencias en la red ahora mismo.");
    lines.push("");
    lines.push("> Prueba con otro término o vuelve más tarde.");
  } else {
    for (const { nodo, tienda, productos } of resultados) {
      lines.push(`> [${tienda || "Tienda"}] — ${nodo || ""}`);
      for (const p of (productos || [])) {
        const precio = p.precio != null
          ? new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" }).format(p.precio)
          : "–";
        const stock = p.stock ?? "–";
        lines.push(`>   ${p.nombre || "–"} · ${precio} · ${stock} uds`);
      }
      lines.push("");
    }
  }

  setCaja(lines);
}

// Renderiza un array de líneas en la caja olive con colores de terminal
function setCaja(lines) {
  cajaEl.innerHTML = lines.map(line => {
    if (line === "") {
      return `<p style="height:0.6em;"></p>`;
    }
    if (line.startsWith("> ")) {
      return `<p><span style="color:#aaaa00;">&gt;</span> ${esc(line.slice(2))}</p>`;
    }
    return `<p style="opacity:0.7;">${esc(line)}</p>`;
  }).join("");

  // Scroll al fondo
  cajaEl.scrollTop = cajaEl.scrollHeight;
}

// Escape HTML básico
function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Micrófono (MediaRecorder → Whisper AI) ────────────────────────────────────

let mediaRecorder = null;
let audioChunks   = [];
let grabando      = false;
const micIcon     = btnMic.querySelector(".material-symbols-rounded");

btnMic.addEventListener("click", async () => {
  if (grabando) {
    mediaRecorder?.stop();
  } else {
    await iniciarGrabacion();
  }
});

async function iniciarGrabacion() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks  = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      grabando = false;
      micIcon.classList.remove("grabando");
      micIcon.textContent = "mic";
      btnMic.style.color = "";
      stream.getTracks().forEach(t => t.stop());

      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
      const b64  = await blobABase64(blob);

      estadoEl.textContent = "Transcribiendo audio…";
      setCaja(["> Transcribiendo audio…"]);
      btnBuscar.disabled = true;

      try {
        // 1 — Transcribir con Whisper
        const tRes  = await fetch(`${AI_BASE}/transcribir`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ audio_base64: b64 }),
        });
        const tData = await tRes.json();
        const texto = (tData.texto || "").trim();

        if (!texto) {
          estadoEl.textContent = "No se detectó voz.";
          setCaja(["> No se detectó voz.", "> Intenta de nuevo."]);
          return;
        }

        inputEl.value = texto;
        estadoEl.textContent = "Procesando consulta…";
        setCaja([`> Transcripción: "${texto}"`, "> Procesando consulta…"]);

        // 2 — Limpiar query con LLM
        const pRes  = await fetch(`${AI_BASE}/procesar`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto }),
        });
        const pData = await pRes.json();
        const query = (pData.query || texto).trim();

        inputEl.value = query;
        estadoEl.textContent = "";
        await buscar(query);
      } catch (e) {
        estadoEl.textContent = "Error en IA: " + e.message;
        setCaja([`> Error: ${e.message}`]);
      } finally {
        btnBuscar.disabled = false;
      }
    };

    mediaRecorder.start();
    grabando = true;
    micIcon.classList.add("grabando");
    micIcon.textContent = "mic";
    btnMic.style.color = "#C21807";
    estadoEl.textContent = "🔴 Grabando… pulsa de nuevo para parar";
    setCaja(["> 🔴 Grabando…", "> Pulsa el micrófono para parar."]);
  } catch (e) {
    estadoEl.textContent = "Sin acceso al micrófono: " + e.message;
    setCaja(["> Sin acceso al micrófono.", `> ${e.message}`]);
  }
}

function blobABase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
</script>
</body>
</html>
