<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagüi — encuéntralo</title>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #E2725B;
    font-family: 'Martian Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #E2725B;
  }

  header {
    width: 100%;
    max-width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 32px;
  }

  .logo {
    font-size: 24px;
    font-weight: 700;
    color: #B32824;
    letter-spacing: -0.03em;
  }

  .header-links {
    display: flex;
    gap: 28px;
  }

  .header-links a {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #B32824;
    opacity: 0.75;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .header-links a:hover { opacity: 1; }

  main {
    width: 100%;
    max-width: 800px;
    padding: 40px 32px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .tagline {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #B32824;
    margin-bottom: 40px;
  }

  .search-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    background-color: #FDF5E6;
    border-radius: 0 0 12px 0;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .search-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Martian Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    color: #808000;
    padding: 18px 24px;
  }

  .search-wrap input::placeholder {
    color: rgba(128,128,0,0.45);
  }

  .search-wrap button {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 18px 22px;
    font-family: 'Martian Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: #808000;
    transition: opacity 0.15s;
  }

  .search-wrap button:hover { opacity: 0.7; }

  .results-box {
    width: 100%;
    background-color: #808000;
    border-radius: 0 0 12px 0;
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
  }

  .results-header {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(253,245,230,0.45);
    margin-bottom: 20px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 15px 0;
    border-bottom: 1px solid rgba(253,245,230,0.1);
  }

  .result-item:last-child { border-bottom: none; padding-bottom: 0; }
  .result-item:first-of-type { padding-top: 0; }

  .result-distance {
    font-size: 11px;
    font-weight: 700;
    color: #FDF5E6;
    min-width: 52px;
    letter-spacing: 0.04em;
    opacity: 0.5;
  }

  .result-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .result-name {
    font-size: 14px;
    font-weight: 500;
    color: #FDF5E6;
    letter-spacing: -0.01em;
  }

  .result-meta {
    font-size: 11px;
    color: rgba(253,245,230,0.45);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .result-status {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-yes { color: #FDF5E6; }
  .status-maybe { color: rgba(253,245,230,0.5); }

  .no-results {
    font-size: 13px;
    color: rgba(253,245,230,0.4);
    font-weight: 400;
    text-align: center;
    padding: 28px 0 8px;
    letter-spacing: 0.01em;
  }

  footer {
    width: 100%;
    max-width: 800px;
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 20px 32px 32px;
  }

  footer a {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #B32824;
    opacity: 0.5;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  footer a:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">Yagüi</div>
  <div class="header-links">
    <a href="#"></a>
    <a href="#"></a>
    <a href="#"></a>
  </div>
</header>

<main>
  <div class="tagline">¿donde quieres buscar?</div>

  <div class="search-wrap">
    <input type="text" placeholder="¿qué estás buscando hoy?" id="searchInput" />
    <button id="btn-buscar">→</button>
  </div>

  <div class="results-box" id="resultsBox">
    <div class="results-header">resultados cercanos</div>

    <div class="result-item">
      <div class="result-distance"></div>
      <div class="result-info">
        <div class="result-name"></div>
        <div class="result-meta"></div>
      </div>
      <div class="result-status status-yes"></div>
    </div>

    <div class="result-item">
      <div class="result-distance"></div>
      <div class="result-info">
        <div class="result-name"></div>
        <div class="result-meta"></div>
      </div>
      <div class="result-status status-yes"></div>
    </div>

    <div class="result-item">
      <div class="result-distance"></div>
      <div class="result-info">
        <div class="result-name"></div>
        <div class="result-meta"></div>
      </div>
      <div class="result-status status-maybe"></div>
    </div>

  </div>
</main>

<footer>
  <a href="#">Privacidad</a>
  <a href="#"></a>
  <a href="#"></a>
  <a href="#">© Yagüi 2026</a>
</footer>


</body>
</html>
