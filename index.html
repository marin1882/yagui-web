<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagüi — Busca en el comercio local</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com/3.4.17" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
<script src="./tailwind-config.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Martian Mono", monospace; }
  body { font-family: "Martian Mono", monospace; }

  .material-symbols-rounded {
    font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
    user-select: none;
    line-height: 1;
  }

  /* Input: quitar borde/outline nativo, placeholder en blanco translúcido */
  #input-busqueda::placeholder { color: rgba(128,128,0,0.4); }
  #input-busqueda:focus { outline: none; }
  #input-busqueda { caret-color: #808000; }

  /* Olive terminal box scrollbar */
  #caja-respuesta::-webkit-scrollbar { width: 5px; }
  #caja-respuesta::-webkit-scrollbar-track { background: rgba(128,128,0,0.5); border-radius: 4px; }
  #caja-respuesta::-webkit-scrollbar-thumb { background: rgba(253,245,230,0.3); border-radius: 4px; }

  /* Mic pulse cuando graba */
  @keyframes mic-pulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.85); }
  }
  .grabando { animation: mic-pulse 0.75s ease-in-out infinite; }

  /* Cursor terminal parpadeante */
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  .cursor-blink { animation: blink 1s step-end infinite; }

  /* Smooth dot color transition */
  #dot-red { transition: background-color 0.5s ease; }
</style>
</head>

<body class="min-h-screen flex flex-col" style="background:#E2725B;">

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header class="flex items-center justify-between px-6 py-5">
  <!-- Logo -->
  <div style="background:#FDF5E6;color:#FD5E53;border-radius:12px 0 0 0;padding:12px 16px;font-weight:700;font-size:1.25rem;letter-spacing:-0.025em;user-select:none;">
    Yagüi
  </div>

  <!-- Estado de la red -->
  <div class="flex items-center gap-2">
    <span id="dot-red"
      class="block w-2 h-2 rounded-full bg-white/25">
    </span>
    <span id="texto-red"
      class="font-mono text-xs tracking-tight" style="color:rgba(253,94,83,0.6);">
      comprobando red…
    </span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     MAIN
═══════════════════════════════════════════ -->
<main class="flex-1 flex flex-col items-center justify-center px-4 pt-2 pb-10 gap-7">

  <!-- Título -->
  <div class="text-center">
    <h1 class="font-bold leading-tight tracking-tight" style="font-size:clamp(2rem,8vw,3.5rem);color:#FD5E53;">
      ¿Qué buscas?
    </h1>
    <p class="text-sm mt-2 font-light" style="color:rgba(253,94,83,0.55);">
      Inventario en tiempo real · comercio local
    </p>
  </div>

  <!-- Barra de búsqueda (sunset) -->
  <div class="w-full" style="max-width:640px;">
    <div class="flex items-center px-4 py-3 gap-2 shadow-lg" style="background:#FDF5E6;border-radius:0 0 12px 0;">

      <!-- Campo de texto -->
      <input
        id="input-busqueda"
        type="text"
        placeholder="tornillos M6, café molido, pintura blanca…"
        class="flex-1 bg-transparent text-base border-none focus:outline-none" style="color:#808000;"
        autocomplete="off"
        spellcheck="false"
      />

      <!-- Botón búsqueda (lupa) -->
      <button
        id="btn-buscar"
        class="transition-colors flex items-center justify-center w-9 h-9 rounded-full" style="color:rgba(128,128,0,0.7);"
        title="Buscar"
        aria-label="Buscar"
      >
        <span class="material-symbols-rounded text-2xl">search</span>
      </button>

      <!-- Separador -->
      <div class="w-px h-5" style="background:rgba(128,128,0,0.2);"></div>

      <!-- Botón micrófono (chile red) -->
      <button
        id="btn-mic"
        class="flex items-center justify-center w-9 h-9 rounded-full transition-colors" style="color:#808000;"
        title="Buscar por voz"
        aria-label="Buscar por voz"
      >
        <span class="material-symbols-rounded text-2xl">mic</span>
      </button>

    </div>

    <!-- Estado / feedback de búsqueda -->
    <p id="estado-busqueda"
       class="font-mono text-xs mt-2 px-1 min-h-[1.1em] tracking-tight" style="color:rgba(253,94,83,0.5);"
    </p>
  </div>

  <!-- Caja de respuesta (olive) -->
  <div class="w-full" style="max-width:640px;">
    <div
      id="caja-respuesta"
      class="rounded-xl p-5 font-mono text-sm leading-relaxed overflow-y-auto shadow-inner"
      style="background:#808000;color:#FDF5E6;min-height:220px;max-height:400px;"
    >
      <!-- Contenido inicial -->
      <p class="opacity-50"><span style="color:rgba(253,245,230,0.5);">&gt;</span> Escribe o habla para buscar</p>
      <p class="opacity-50"><span style="color:rgba(253,245,230,0.5);">&gt;</span> en la red Yagüi</p>
      <p class="mt-3 opacity-30">
        <span class="cursor-blink">█</span>
      </p>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════ -->
<footer class="text-center py-5 px-6 font-mono text-xs space-y-1.5" style="color:rgba(253,94,83,0.5);">
  <div class="flex justify-center gap-5 flex-wrap">
    <a href="#" class="transition-colors" style="color:rgba(253,94,83,0.5);">Privacidad</a>
    <a href="#" class="transition-colors" style="color:rgba(253,94,83,0.5);">Términos</a>
    <a href="#" class="transition-colors" style="color:rgba(253,94,83,0.5);">Acerca de</a>
  </div>
</footer>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════ -->
<script src="./main.js"></script>
</body>
</html>
